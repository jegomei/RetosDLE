<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="cl"><rect x="0"   y="0" width="248" height="512"/></clipPath>
    <clipPath id="cr"><rect x="264" y="0" width="248" height="512"/></clipPath>
  </defs>
  <!-- Fondo -->
  <rect width="512" height="512" rx="85" fill="#0f172a"/>
  <!-- R mitad izquierda (rojo) -->
  <text x="256" y="400"
        font-family="'Arial Black','Arial Bold',Arial,sans-serif"
        font-size="420" font-weight="900" text-anchor="middle"
        fill="#c62828" clip-path="url(#cl)">R</text>
  <!-- R mitad derecha (azul) -->
  <text x="256" y="400"
        font-family="'Arial Black','Arial Bold',Arial,sans-serif"
        font-size="420" font-weight="900" text-anchor="middle"
        fill="#1565c0" clip-path="url(#cr)">R</text>
  <!-- Barra divisoria central -->
  <rect x="248" y="64" width="16" height="384" rx="8" fill="rgba(255,255,255,0.15)"/>
</svg>
